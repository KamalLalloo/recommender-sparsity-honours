# Model
model: LightGCN

# Reproducibility
seed: 2025
reproducibility: true

# Training
epochs: 100
learning_rate: 0.001

# Graph
embedding_size: 64
n_layers: 3

# Regularisation
reg_weight: 1e-5

# Batch sizes
train_batch_size: 2048
eval_batch_size: 4096

# Runtime output
state: INFO
show_progress: true

# CPU execution
use_gpu: false
